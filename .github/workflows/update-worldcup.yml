name: Update World Cup data
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
concurrency:
  group: update-worldcup
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch and normalize ESPN data
        run: node scripts/update-espn.mjs
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.json data/worldcup-data.js
          git diff --cached --quiet || git commit -m "Update World Cup data"
          git pull --rebase
          git push
