name: Update World Cup data
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch and normalize API-Football data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' }}
        run: node scripts/update-api-football.mjs
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.json data/worldcup-data.js data/raw-fixtures.json || true
          git diff --cached --quiet || git commit -m "Update World Cup data"
          git push
